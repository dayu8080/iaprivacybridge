# ==================================================================================================
# IAPrivacyBridge - конфигурация
# ==================================================================================================

radius: 20
full-height: true

allowed-blocks:
  - "armenianbanners:armenian_wool_banner"

# Можно добавить префикс "-g <группа>" перед именем флага (как в ProtectionStones):
#   -g non-members  = только для чужих игроков (НЕ владелец и НЕ участники)
#   -g members      = только для участников
#   -g owners       = только для владельца
# Без префикса флаг действует АБСОЛЮТНО НА ВСЕХ, включая владельца - именно поэтому
# владелец не мог строить у себя раньше.
flags:
  - "pvp allow"
  - "wither-damage allow"
  - "block-break allow"
  - "-g non-members block-place deny"
  - "creeper-explosion deny"
  - "ghast-fireball deny"
  - "greeting Вы вошли в зону игрока {owner}"
  - "farewell Вы покинули зону игрока {owner}"
